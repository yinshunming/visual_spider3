server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/visual_spider3_new
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

spider:
  schedule:
    enabled: true
    thread-pool-size: 3
  crawler:
    thread-pool-size: 10
    retry-times: 2
    timeout: 30000

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.example.visualspider: DEBUG
